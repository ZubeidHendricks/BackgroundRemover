# Generated by AppFactoryKit appgen. Run: xcodegen generate
name: BackgroundRemover
options:
  bundleIdPrefix: com.zubeid
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AppFactoryKit:
    url: https://github.com/ZubeidHendricks/AppFactoryKit
    from: "0.1.0"

targets:
  BackgroundRemover:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: AppFactoryKit
        product: AppFactoryKit
      - package: AppFactoryKit
        product: AppFactoryKitRevenueCat
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "BackgroundRemover"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "BackgroundRemover uses the camera to capture and process your content."
        NSPhotoLibraryUsageDescription: "BackgroundRemover needs access to your photos to import and process images."
        NSPhotoLibraryAddUsageDescription: "BackgroundRemover saves your results to your photo library."
    settings:
      base:
        PRODUCT_NAME: BackgroundRemover
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.backgroundremover
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic

  BackgroundRemoverTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Sources/BackgroundService.swift
    settings:
      base:
        PRODUCT_NAME: BackgroundRemoverTests
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.backgroundremover.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"

schemes:
  Tests:
    build:
      targets:
        BackgroundRemoverTests: [test]
    test:
      targets:
        - BackgroundRemoverTests
